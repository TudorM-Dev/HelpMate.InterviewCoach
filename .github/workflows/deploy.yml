name: Deploy to Azure

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish
        run: dotnet publish HelpMate.InterviewCoach.Api --configuration Release --output publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: helpmate-interview-coach
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: publish